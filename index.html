<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    let isPlaying = false, isAuto = false, currentTheme = 1;
    let themeStartTime = Date.now(), lastCheckedMin = -1, nextLoopTimeout = null, autoCheckInterval = null;
    let themeWeights = [1, 1, 1, 1, 1, 1, 1, 1];

    const mainBus = new Tone.Gain(1).toDestination();

    const createDeck = () => {
        const g = new Tone.Gain(0).connect(mainBus);
        const p = new Tone.Players({
            "t1": "theme1.mp3", "t2": "theme2.mp3", "t3": "theme3.mp3", "t4": "theme4.mp3",
            "t5": "theme5.mp3", "t6": "theme6.mp3", "t7": "theme7.mp3", "t8": "theme8.mp3"
        }).connect(g);
        return { players: p, volume: g };
    };

    const deckA = createDeck();
    const deckB = createDeck();
    let activeDeck = deckA;
    const names = ["Orchestre Noble", "Onde Hertz", "Bois de Roseau", "Écho de Grotte", "Chœur de Velours", "Aube de Jade", "Souffle Sacré", "Résonance de Gorge"];

    // --- LOGIQUE DE RELANCE AUTO APRÈS MAJ ---
    window.addEventListener('load', () => {
        if (localStorage.getItem('autoPlayAfterUpdate') === 'true') {
            localStorage.removeItem('autoPlayAfterUpdate');
            // Petit délai pour laisser l'audio s'initialiser
            setTimeout(() => { 
                const btn = document.getElementById('mainBtn');
                if(btn) btn.click(); 
            }, 800);
        }
    });

    // --- FONCTIONS AUDIO ---
    function scheduleNextLoop() {
        if (!isPlaying) return;
        const p = activeDeck.players.player("t" + currentTheme);
        if (!p.buffer.loaded) { setTimeout(scheduleNextLoop, 1000); return; }

        const duration = p.buffer.duration;
        const fadeTime = 6; 
        const timeToWait = (duration - fadeTime) * 1000;

        clearTimeout(nextLoopTimeout);
        nextLoopTimeout = setTimeout(() => {
            if (isPlaying) {
                const nextDeck = (activeDeck === deckA) ? deckB : deckA;
                nextDeck.volume.gain.value = 0;
                nextDeck.players.player("t" + currentTheme).start(Tone.now());
                nextDeck.volume.gain.rampTo(1, fadeTime);
                activeDeck.volume.gain.rampTo(0, fadeTime);
                activeDeck = nextDeck;
                scheduleNextLoop();
            }
        }, timeToWait);
    }

    function startAudio() {
        if (isPlaying) return;
        isPlaying = true;
        themeStartTime = Date.now();
        activeDeck.volume.gain.value = 1;
        activeDeck.players.player("t" + currentTheme).start(Tone.now());
        scheduleNextLoop();
        document.getElementById('mainBtn').innerText = "STOP";
        document.getElementById('mainBtn').classList.add("active");
    }

    function stopAudio() {
        isPlaying = false;
        clearTimeout(nextLoopTimeout);
        deckA.volume.gain.rampTo(0, 0.5);
        deckB.volume.gain.rampTo(0, 0.5);
        document.getElementById('mainBtn').innerText = "START";
        document.getElementById('mainBtn').classList.remove("active");
    }

    // --- BOUTON START INTELLIGENT ---
    document.getElementById('mainBtn').onclick = async () => {
        await Tone.start();
        
        if (!isPlaying) {
            const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            // On considère "Wi-Fi" si on n'est pas en mode "saveData" et sur une connexion rapide
            const isWifi = conn && !conn.saveData && (conn.type === 'wifi' || conn.effectiveType === '4g');

            if (isWifi && 'serviceWorker' in navigator) {
                const registration = await navigator.serviceWorker.ready;
                let updateFound = false;

                // Si une MAJ est détectée pendant la vérification
                registration.onupdatefound = () => {
                    updateFound = true;
                    const installingWorker = registration.installing;
                    installingWorker.onstatechange = () => {
                        if (installingWorker.state === 'installed') {
                            localStorage.setItem('autoPlayAfterUpdate', 'true');
                            location.reload(); 
                        }
                    };
                };

                await registration.update();

                // Si après 1.2s aucune MAJ n'est trouvée, on lance le son
                setTimeout(() => {
                    if (!updateFound && !isPlaying) startAudio();
                }, 1200);

            } else {
                // Pas de Wi-Fi ou économie de données : Lancement direct
                startAudio();
            }
        } else {
            stopAudio();
        }
    };

    function manualChange(n) {
        if (n === currentTheme && isPlaying) return;
        currentTheme = n; themeStartTime = Date.now(); lastCheckedMin = -1;
        themeWeights[n-1] += 2;
        document.querySelectorAll('.sel-btn').forEach((b, i) => b.classList.toggle('active', i + 1 === n));
        document.getElementById('themeName').innerText = names[n-1];
        if (isPlaying) {
            clearTimeout(nextLoopTimeout);
            const nextDeck = (activeDeck === deckA) ? deckB : deckA;
            activeDeck.volume.gain.rampTo(0, 4);
            nextDeck.volume.gain.value = 0;
            nextDeck.players.player("t" + n).start(Tone.now() + 0.1);
            nextDeck.volume.gain.rampTo(1, 4);
            activeDeck = nextDeck;
            scheduleNextLoop();
        }
    }

    function toggleAuto() {
        isAuto = !isAuto;
        document.getElementById('autoToggle').classList.toggle('on', isAuto);
        const indicator = document.getElementById('statusIndicator');
        if (isAuto) {
            themeStartTime = Date.now();
            indicator.innerText = "AUTOMATIQUE";
            autoCheckInterval = setInterval(() => {
                if (!isPlaying || !isAuto) return;
                const mins = Math.floor((Date.now() - themeStartTime) / 60000);
                if (lastCheckedMin !== mins) {
                    let chance = 0;
                    if (mins === 30) chance = 30;
                    if (mins === 45) chance = 45;
                    if (mins === 60) chance = 60;
                    if (mins === 90) chance = 90;
                    if (mins >= 100) chance = 100;
                    if (chance > 0) {
                        lastCheckedMin = mins;
                        if (Math.random() * 100 < chance) pickSmartNextTheme();
                    }
                }
            }, 1000); 
        } else {
            clearInterval(autoCheckInterval);
            indicator.innerText = "STABLE";
        }
    }

    function pickSmartNextTheme() {
        let inv = themeWeights.map(w => 1 / w);
        inv[currentTheme - 1] = 0;
        let total = inv.reduce((a, b) => a + b, 0);
        let r = Math.random() * total, cum = 0, nextT = 1;
        for (let i = 0; i < inv.length; i++) {
            cum += inv[i];
            if (r < cum) { nextT = i + 1; break; }
        }
        manualChange(nextT);
    }
</script>
