<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V6 FLASH</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        /* FOND FLASHY : IMPOSSIBLE À RATER */
        body { background: #d35400; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        #mainBtn { padding: 20px 50px; font-size: 20px; border-radius: 10px; border: 3px solid white; background: transparent; color: white; font-weight: bold; }
    </style>
</head>
<body>

    <h1 style="font-size: 40px;">V6 - FLASH</h1>
    <button id="mainBtn">TESTER LE SON</button>

    <script>
        const btn = document.getElementById('mainBtn');
        let isPlaying = false;

        Tone.context.lookAhead = 0.6;

        // Limiter à 3 voix maximum pour soulager le téléphone
        const piano = new Tone.PolySynth(Tone.Synth, {
            maxPolyphony: 3, 
            oscillator: { type: "sine" },
            envelope: { attack: 2, decay: 1, sustain: 0.5, release: 4 }
        }).toDestination();

        // Echo ultra simplifié
        const delay = new Tone.FeedbackDelay("4n", 0.3).toDestination();
        const filter = new Tone.Filter(400, "lowpass").toDestination();
        
        piano.connect(filter);
        filter.connect(delay);
        piano.volume.value = -15;

        const notes = ["F2", "Ab2", "C3", "Eb3", "F3", "Ab3"];

        const loop = new Tone.Loop((time) => {
            if (Math.random() > 0.3) {
                const n = notes[Math.floor(Math.random() * notes.length)];
                piano.triggerAttackRelease(n, "2n", time);
            }
        }, "1n"); // On ralentit le rythme pour laisser respirer le CPU

        btn.addEventListener('click', async () => {
            if (!isPlaying) {
                await Tone.start();
                Tone.Transport.start();
                loop.start(0);
                btn.innerText = "STOP";
                isPlaying = true;
            } else {
                Tone.Transport.stop();
                loop.stop();
                piano.releaseAll();
                btn.innerText = "TESTER LE SON";
                isPlaying = false;
            }
        });
    </script>
</body>
</html>
