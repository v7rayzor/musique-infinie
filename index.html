<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Musique Infinie</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --v-fond: #ffffff; --v-accent: #2d4a3e; --v-soft: #a8b9ad; --v-green: #4caf50; --v-light-green: #81c784; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { background: var(--v-fond); color: var(--v-accent); margin: 0; padding: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Styles identiques aux tags du haut */
        .loading-text { 
            font-family: monospace; 
            font-size: 9px; 
            font-weight: bold; 
            opacity: 0.5; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 0.7; } 100% { opacity: 0.3; } }

        #wifiBlocker { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 10000; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        .wifi-icon { font-size: 50px; margin-bottom: 25px; }
        .wifi-text { font-size: 13px; letter-spacing: 1px; line-height: 1.8; color: var(--v-accent); text-transform: uppercase; margin-bottom: 30px; }
        #retryBtn { background: var(--v-accent); color: white; border: none; padding: 15px 25px; border-radius: 30px; font-size: 11px; font-weight: bold; letter-spacing: 2px; cursor: pointer; text-transform: uppercase; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; width: 100%; }
        .header-tag, .version-tag { font-family: monospace; font-size: 9px; font-weight: bold; opacity: 0.3; text-transform: uppercase; letter-spacing: 1px; }
        .right-side { position: relative; display: flex; align-items: center; justify-content: flex-end; min-width: 80px; height: 30px; }
        
        #updateNotice { display: none; position: absolute; right: 0; background: #fcfdfc; border: 1px solid var(--v-light-green); color: var(--v-light-green); font-size: 8px; padding: 6px 10px; border-radius: 15px; font-weight: bold; letter-spacing: 1px; cursor: pointer; z-index: 10; white-space: nowrap; }

        #appContent { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: space-evenly; padding: 10px 20px 40px 20px; }
        
        /* Conteneur pour le bouton ou le texte */
        .main-action-area { height: 150px; display: flex; align-items: center; justify-content: center; }

        #mainBtn { 
            display: none; /* Caché par défaut */
            width: 150px; height: 150px; border: 1px solid #f0f0f0; border-radius: 50%; 
            background: #fcfdfc; color: var(--v-accent); font-size: 10px; letter-spacing: 5px; 
            font-weight: 700; cursor: pointer; transition: 0.4s; opacity: 0; 
        }
        #mainBtn.visible { display: block; opacity: 1; }
        #mainBtn.active { background: var(--v-accent); color: #fff; border-color: var(--v-accent); transform: scale(0.95); }
        
        .selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 340px; }
        .sel-btn { background: #fcfdfc; border: 1px solid #f8fcf9; color: var(--v-soft); font-size: 12px; height: 60px; border-radius: 20px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .sel-btn.active { color: var(--v-accent); border-color: #eee; font-weight: bold; background: #fff; }
        
        .auto-section { width: 100%; max-width: 300px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .toggle-container { width: 65px; height: 34px; background: #eee; border-radius: 20px; padding: 4px; cursor: pointer; position: relative; transition: 0.3s; }
        .toggle-container.on { background: var(--v-green); }
        .toggle-circle { width: 26px; height: 26px; background: white; border-radius: 50%; transition: 0.3s; position: absolute; top: 4px; left: 4px; }
        .toggle-container.on .toggle-circle { left: 35px; }
        #themeName { font-size: 16px; font-weight: 500; color: var(--v-accent); }
        #statusIndicator { font-size: 10px; color: var(--v-soft); font-family: monospace; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="wifiBlocker">
        <div class="wifi-icon">📡</div>
        <div class="wifi-text"><strong>Configuration Initiale</strong><br><br>Veuillez utiliser un réseau <b>Wi-Fi</b><br>pour activer votre espace sonore.</div>
        <button id="retryBtn" onclick="location.reload()">Vérifier à nouveau</button>
    </div>

    <div class="top-bar">
        <div class="header-tag">UG 67 — CÉDRIC</div>
        <div class="right-side">
            <div class="version-tag">v1.2</div>
            <button id="updateNotice" onclick="applyUpdate()">MAJ DISPONIBLE</button>
        </div>
    </div>

    <div id="appContent">
        <div class="main-action-area">
            <div id="loadMsg" class="loading-text">Chargement en cours...</div>
            <button id="mainBtn">START</button>
        </div>

        <div class="selector">
            <button class="sel-btn" onclick="manualChange(1)">TRIANGLE</button>
            <button class="sel-btn" onclick="manualChange(2)">PIANO</button>
            <button class="sel-btn" onclick="manualChange(3)">HARPE</button>
        </div>
        <div class="auto-section">
            <div id="autoToggle" class="toggle-container" onclick="toggleAuto()"><div class="toggle-circle"></div></div>
            <div id="themeName">Triangle</div>
            <div id="statusIndicator">STABLE</div>
        </div>
    </div>

    <script>
        let isPlaying = false, isAuto = false, currentTheme = 1;
        let themeStartTime = Date.now(), lastCheckedMin = -1, nextLoopTimeout = null, autoCheckInterval = null;
        let reg = null;

        const names = ["Triangle", "Piano", "Harpe"];
        const files = { "t1": "Triangle.mp3", "t2": "Piano.mp3", "t3": "Harpe.mp3" };

        const mainBus = new Tone.Gain(1).toDestination();
        const createDeck = () => {
            const g = new Tone.Gain(0).connect(mainBus);
            const p = new Tone.Players(files).connect(g);
            return { players: p, volume: g };
        };

        const deckA = createDeck();
        const deckB = createDeck();
        let activeDeck = deckA;

        window.addEventListener('load', async () => {
            const blocker = document.getElementById('wifiBlocker');
            const content = document.getElementById('appContent');
            const mainBtn = document.getElementById('mainBtn');
            const loadMsg = document.getElementById('loadMsg');
            
            const keys = await caches.keys();
            const hasAnyCache = keys.length > 0;
            const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            
            if (!hasAnyCache && conn && (conn.type === 'cellular' || conn.saveData)) {
                blocker.style.display = 'flex';
                return; 
            } else {
                content.style.display = 'flex';
            }

            // Gestion du chargement
            Tone.loaded().then(() => {
                loadMsg.style.display = 'none';
                mainBtn.classList.add('visible');
            });

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').then(r => {
                    reg = r;
                    reg.update();
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                document.getElementById('updateNotice').style.display = 'block';
                            }
                        });
                    });
                });
            }

            const savedTheme = localStorage.getItem('lastTheme');
            if (savedTheme && savedTheme <= 3) { currentTheme = parseInt(savedTheme); updateUI(currentTheme); }
        });

        function updateUI(n) {
            document.querySelectorAll('.sel-btn').forEach((b, i) => b.classList.toggle('active', i + 1 === n));
            document.getElementById('themeName').innerText = names[n-1];
        }

        document.getElementById('mainBtn').onclick = async () => {
            await Tone.start();
            const btn = document.getElementById('mainBtn');

            if (!isPlaying) {
                isPlaying = true;
                btn.innerText = "STOP";
                btn.classList.add("active");
                
                activeDeck.volume.gain.value = 1;
                activeDeck.players.player("t" + currentTheme).start();
                scheduleNextLoop();
            } else {
                isPlaying = false;
                btn.innerText = "START";
                btn.classList.remove("active");
                
                clearTimeout(nextLoopTimeout);
                deckA.volume.gain.rampTo(0, 0.8);
                deckB.volume.gain.rampTo(0, 0.8);
                
                // On laisse le temps au fondu de sortie avant de stopper les lecteurs
                setTimeout(() => {
                    deckA.players.stopAll();
                    deckB.players.stopAll();
                }, 900);
            }
        };

        function manualChange(n) {
            if (n === currentTheme && isPlaying) return;
            const oldTheme = currentTheme;
            currentTheme = n;
            localStorage.setItem('lastTheme', n);
            updateUI(n);

            if (isPlaying) {
                clearTimeout(nextLoopTimeout);
                const nextDeck = (activeDeck === deckA) ? deckB : deckA;
                const prevDeck = activeDeck;

                nextDeck.volume.gain.value = 0;
                nextDeck.players.player("t" + n).start(Tone.now() + 0.1);
                nextDeck.volume.gain.rampTo(1, 4);
                prevDeck.volume.gain.rampTo(0, 4);

                setTimeout(() => { 
                    prevDeck.players.player("t" + oldTheme).stop(); 
                }, 4100);

                activeDeck = nextDeck;
                scheduleNextLoop();
            }
        }

        function scheduleNextLoop() {
            if (!isPlaying) return;
            const p = activeDeck.players.player("t" + currentTheme);
            const duration = p.buffer.duration;
            const timeToWait = (duration - 6) * 1000;
            
            clearTimeout(nextLoopTimeout);
            nextLoopTimeout = setTimeout(() => {
                if (isPlaying) {
                    const nextDeck = (activeDeck === deckA) ? deckB : deckA;
                    nextDeck.volume.gain.value = 0;
                    nextDeck.players.player("t" + currentTheme).start();
                    nextDeck.volume.gain.rampTo(1, 6);
                    activeDeck.volume.gain.rampTo(0, 6);
                    
                    const oldDeck = activeDeck;
                    const themeToStop = currentTheme;
                    setTimeout(() => { if(isPlaying) oldDeck.players.player("t" + themeToStop).stop(); }, 6100);
                    
                    activeDeck = nextDeck;
                    scheduleNextLoop();
                }
            }, timeToWait);
        }

        function toggleAuto() {
            isAuto = !isAuto;
            document.getElementById('autoToggle').classList.toggle('on', isAuto);
            document.getElementById('statusIndicator').innerText = isAuto ? "AUTOMATIQUE" : "STABLE";
            if (isAuto) { themeStartTime = Date.now(); startAutoTimer(); }
            else clearInterval(autoCheckInterval);
        }

        function startAutoTimer() {
            clearInterval(autoCheckInterval);
            autoCheckInterval = setInterval(() => {
                if (!isPlaying || !isAuto) return;
                const mins = Math.floor((Date.now() - themeStartTime) / 60000);
                if (lastCheckedMin !== mins) {
                    if (mins >= 30 && Math.random() * 100 < mins) pickSmartNextTheme();
                    lastCheckedMin = mins;
                }
            }, 1000);
        }

        function pickSmartNextTheme() {
            let nextT = currentTheme;
            while(nextT === currentTheme) { nextT = Math.floor(Math.random() * 3) + 1; }
            manualChange(nextT);
        }

        function applyUpdate() { location.reload(); }
    </script>
</body>
</html>
