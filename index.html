<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V1.3 - PROFONDEUR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { background: #203140; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        #mainBtn { padding: 20px 40px; border-radius: 15px; border: 2px solid #fff; background: transparent; color: #fff; cursor: pointer; font-weight: bold; }
        h1 { font-weight: 100; margin-bottom: 30px; letter-spacing: 5px; }
    </style>
</head>
<body>

    <h1>V1.3 PROFONDEUR</h1>
    <button id="mainBtn">CHARGEMENT</button>

    <script>
        const btn = document.getElementById('mainBtn');
        let isPlaying = false;

        // 1. PIANO (On remonte le volume)
        const piano = new Tone.Sampler({
            urls: { "C4": "C4.mp3", "A3": "A3.mp3" },
            baseUrl: "https://tonejs.github.io/audio/salamander/",
            onload: () => { btn.innerText = "LANCER L'IMMERSION"; }
        }).toDestination();
        piano.volume.value = -5; // Plus présent

        // 2. VIOLONCELLE (Synthétique mais riche)
        const cello = new Tone.MonoSynth({
            oscillator: { type: "sawtooth" }, // Son plus riche que la nappe
            envelope: { attack: 2, release: 3 }
        }).toDestination();
        const cFilter = new Tone.Filter(150, "lowpass").toDestination(); // Très sourd pour faire "basse"
        cello.connect(cFilter);
        cello.volume.value = -20;

        const scale = ["C3", "D3", "E3", "G3", "A3", "C4"];
        let currentIndex = 3;
        let step = 0;

        const loop = new Tone.Loop((time) => {
            step++;

            // PIANO : Toujours la marche de l'ivrogne
            if (Math.random() > 0.4) {
                const move = Math.floor(Math.random() * 3) - 1;
                currentIndex = Math.max(0, Math.min(scale.length - 1, currentIndex + move));
                piano.triggerAttackRelease(scale[currentIndex], "1n", time, 0.3);
            }

            // VIOLONCELLE : Joue une basse toutes les 8 pulsations
            if (step % 8 === 0) {
                cello.triggerAttackRelease("C2", "2n", time, 0.2);
            }
        }, "4n");

        btn.addEventListener('click', async () => {
            if (!isPlaying) {
                await Tone.start();
                Tone.Transport.start();
                loop.start(0);
                btn.innerText = "STOP";
                isPlaying = true;
            } else {
                Tone.Transport.stop();
                loop.stop();
                btn.innerText = "LANCER L'IMMERSION";
                isPlaying = false;
            }
        });
    </script>
</body>
</html>
