<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Musique Infinie</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        #mainBtn { padding: 15px 40px; font-size: 18px; border-radius: 50px; border: none; background: #4CAF50; color: white; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
    </style>
</head>
<body>

    <h1 style="font-weight: 300; margin-bottom: 50px;">Musique Infinie</h1>
    <button id="mainBtn">Lancer la musique</button>

    <script>
        const btn = document.getElementById('mainBtn');
        let isPlaying = false;

        // OPTIMISATION MOBILE : On donne plus de temps au processeur (0.1s de marge)
        Tone.context.lookAhead = 0.1;

        // Instrument très léger pour processeur mobile
        const piano = new Tone.PolySynth(Tone.Synth, {
            oscillator: { type: "sine" },
            envelope: { attack: 2, decay: 2, sustain: 0.4, release: 8 }
        }).toDestination();

        // Effets simplifiés (moins de craquements)
        const lowpass = new Tone.Filter(350, "lowpass").toDestination();
        const reverb = new Tone.Reverb({ decay: 8, wet: 0.4 }).toDestination();
        
        piano.connect(lowpass);
        lowpass.connect(reverb);
        piano.volume.value = -18;

        const notes = ["F2", "Ab2", "C3", "Eb3", "F3", "Ab3", "C4"];

        const loop = new Tone.Loop((time) => {
            if (Math.random() > 0.15) {
                const n = notes[Math.floor(Math.random() * notes.length)];
                piano.triggerAttackRelease(n, "2n", time);
            }
        }, "2n");

        btn.addEventListener('click', async () => {
            if (!isPlaying) {
                await Tone.start();
                Tone.Transport.start();
                loop.start(0);
                btn.innerText = "Arrêter la musique";
                btn.style.background = "#555";
                isPlaying = true;
            } else {
                Tone.Transport.stop();
                loop.stop();
                piano.releaseAll();
                btn.innerText = "Lancer la musique";
                btn.style.background = "#4CAF50";
                isPlaying = false;
            }
        });
    </script>
</body>
</html>
