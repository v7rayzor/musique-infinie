<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V3.3 - HUMAN TOUCH</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { background: #efede0; color: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Courier New', Courier, monospace; }
        #mainBtn { padding: 25px 60px; border: 2px solid #333; background: transparent; color: #333; cursor: pointer; font-size: 14px; letter-spacing: 5px; text-transform: uppercase; transition: 0.4s; box-shadow: 5px 5px 0px #333; }
        #mainBtn:active { box-shadow: 0px 0px 0px #333; transform: translate(5px, 5px); }
        h1 { font-weight: 900; margin-bottom: 40px; letter-spacing: 2px; opacity: 0.8; }
    </style>
</head>
<body>

    <h1>V3.3 • ORCHESTRE ORGANIQUE</h1>
    <button id="mainBtn">Vibrer</button>

    <script>
        const btn = document.getElementById('mainBtn');
        let isPlaying = false;

        // 1. PIANO (Référence V2.4 + Humanizing)
        const piano = new Tone.Sampler({
            urls: { "C4": "C4.mp3", "A3": "A3.mp3" },
            baseUrl: "https://tonejs.github.io/audio/salamander/",
        }).toDestination();
        piano.volume.value = -8;

        // 2. HARPE (Avec Delay spatial)
        const harp = new Tone.PolySynth(Tone.Synth, {
            oscillator: { type: "sine" },
            envelope: { attack: 0.2, decay: 1, sustain: 0, release: 3 }
        }).toDestination();
        const hDelay = new Tone.PingPongDelay("4n", 0.2).toDestination();
        harp.connect(hDelay);
        harp.volume.value = -28;

        // 3. CORDES & CELLO (Fondation)
        const strings = new Tone.PolySynth(Tone.Synth, {
            oscillator: { type: "triangle" },
            envelope: { attack: 5, release: 8 }
        }).toDestination();
        const sFilter = new Tone.Filter(180, "lowpass").toDestination();
        strings.connect(sFilter);
        strings.volume.value = -32;

        const progression = [
            ["F2", "A3", "C4", "E4", "G4"],
            ["D2", "F3", "A3", "C4", "F4"],
            ["Bb1", "D3", "F3", "A3", "D4"]
        ];
        let currentIdx = 0;
        let step = 0;

        const loop = new Tone.Loop((time) => {
            step++;

            if (step % 32 === 1) {
                currentIdx = (currentIdx + 1) % progression.length;
                strings.releaseAll();
                strings.triggerAttack([progression[currentIdx][1], progression[currentIdx][2]], time);
            }

            const activeChord = progression[currentIdx];
            const jitter = Math.random() * 0.05; // Le petit retard humain (0 à 50ms)

            // PIANO (Hasard de force et de temps)
            if (Math.random() > 0.5) {
                const note = activeChord[Math.floor(Math.random() * 2) + 2];
                const velocity = Math.random() * 0.1 + 0.02; // Touche plus ou moins forte
                piano.triggerAttackRelease(note, "1n", time + jitter, velocity);
            }

            // HARPE (Arpège décalé)
            if (Math.random() > 0.7) {
                const hNote = activeChord[Math.floor(Math.random() * 2) + 3];
                const hVelocity = Math.random() * 0.05 + 0.01;
                harp.triggerAttackRelease(hNote, "2n", time + 0.2 + jitter, hVelocity);
            }

        }, "4n");

        btn.addEventListener('click', async () => {
            if (!isPlaying) {
                await Tone.start();
                Tone.Transport.start();
                loop.start(0);
                btn.innerText = "Silence";
                isPlaying = true;
            } else {
                Tone.Transport.stop();
                loop.stop();
                strings.releaseAll();
                btn.innerText = "Vibrer";
                isPlaying = false;
            }
        });
    </script>
</body>
</html>
