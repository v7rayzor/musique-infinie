<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UG 67 - V10.2 PERFECTION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --v-fond: #ffffff; --v-accent: #2d4a3e; --v-soft: #a8b9ad; --v-red: #cc5a5a; --v-green: #4caf50; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { background: var(--v-fond); color: var(--v-accent); margin: 0; padding: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header-tag { padding: 20px; font-family: monospace; font-size: 10px; opacity: 0.4; letter-spacing: 2px; text-align: center; }
        .container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; padding: 20px; }
        #mainBtn { width: 130px; height: 130px; border: 1.5px solid var(--v-accent); border-radius: 50%; background: white; color: var(--v-accent); font-size: 12px; letter-spacing: 5px; font-weight: 700; cursor: pointer; transition: 0.4s; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        #mainBtn.active { background: var(--v-accent); color: #fff; transform: scale(0.95); }
        .selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; max-width: 340px; }
        .sel-btn { background: #fcfdfc; border: 1px solid #f0f0f0; color: var(--v-soft); font-size: 16px; height: 55px; border-radius: 15px; cursor: pointer; }
        .sel-btn.active { color: var(--v-accent); border-color: var(--v-accent); font-weight: bold; background: #fff; }
        .auto-section { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .toggle-container { width: 60px; height: 30px; background: #eee; border-radius: 20px; position: relative; cursor: pointer; transition: 0.3s; }
        .toggle-container.on { background: var(--v-green); }
        .toggle-circle { width: 22px; height: 22px; background: white; border-radius: 50%; position: absolute; top: 4px; left: 4px; transition: 0.3s; }
        .toggle-container.on .toggle-circle { left: 34px; }
        #themeName { font-size: 15px; }
        #timerStatus { font-size: 10px; color: var(--v-soft); font-family: monospace; }
    </style>
</head>
<body>

    <div class="header-tag">UG 67 — V10.2 GAPLESS MASTER</div>

    <div class="container">
        <button id="mainBtn">START</button>
        
        <div class="selector">
            <button class="sel-btn active" onclick="manualChange(1)">I</button>
            <button class="sel-btn" onclick="manualChange(2)">II</button>
            <button class="sel-btn" onclick="manualChange(3)">III</button>
            <button class="sel-btn" onclick="manualChange(4)">IV</button>
            <button class="sel-btn" onclick="manualChange(5)">V</button>
            <button class="sel-btn" onclick="manualChange(6)">VI</button>
            <button class="sel-btn" onclick="manualChange(7)">VII</button>
            <button class="sel-btn" onclick="manualChange(8)">VIII</button>
        </div>

        <div class="auto-section">
            <div id="autoToggle" class="toggle-container" onclick="toggleAuto()"><div class="toggle-circle"></div></div>
            <div id="themeName">Orchestre Noble</div>
            <div id="timerStatus">Prêt</div>
        </div>
    </div>

    <script>
        let isPlaying = false, isAuto = false, currentTheme = 1;
        let themeStartTime = Date.now(), lastChanceSec = 0;
        let themeHistory = [1, 1, 1, 1, 1, 1, 1, 1];
        let nextLoopTimeout = null;

        const master = new Tone.Gain(3.5).toDestination();

        const players = new Tone.Players({
            "t1": "theme1.webm", "t2": "theme2.webm", "t3": "theme3.webm", "t4": "theme4.webm",
            "t5": "theme5.webm", "t6": "theme6.webm", "t7": "theme7.webm", "t8": "theme8.webm"
        }, () => {
            document.getElementById('timerStatus').innerText = "Audio Prêt";
        }).connect(master);

        Object.keys(players._players).forEach(key => {
            const p = players.player(key);
            p.loop = false; // On gère manuellement
            p.fadeIn = 6;
            p.fadeOut = 6;
        });

        // LA FONCTION BOUCLE MAGIQUE
        function scheduleNextLoop() {
            if (!isPlaying) return;
            
            const p = players.player("t" + currentTheme);
            const duration = p.buffer.duration;
            
            // On relance 5 secondes AVANT la fin réelle du fichier
            // Cela crée un chevauchement parfait (crossfade)
            const timeToWait = (duration - 5) * 1000;

            nextLoopTimeout = setTimeout(() => {
                if (isPlaying) {
                    console.log("Relance invisible (Crossfade)");
                    // On ne stoppe pas l'ancien, le fadeOut s'en chargera ou il finira naturellement
                    p.start(Tone.now(), 0); 
                    scheduleNextLoop();
                }
            }, timeToWait);
        }

        function play() {
            if (!isPlaying) return;
            const p = players.player("t" + currentTheme);
            p.start(Tone.now(), 0);
            scheduleNextLoop();
        }

        document.getElementById('mainBtn').onclick = async () => {
            await Tone.start();
            if (!isPlaying) {
                isPlaying = true; themeStartTime = Date.now(); lastChanceSec = 0;
                play();
                document.getElementById('mainBtn').innerText = "STOP";
                document.getElementById('mainBtn').classList.add("active");
            } else {
                isPlaying = false;
                clearTimeout(nextLoopTimeout);
                players.stopAll();
                document.getElementById('mainBtn').innerText = "START";
                document.getElementById('mainBtn').classList.remove("active");
            }
        };

        function manualChange(n) {
            if (n === currentTheme && isPlaying) return;
            const oldT = currentTheme;
            currentTheme = n;
            themeStartTime = Date.now(); lastChanceSec = 0;
            themeHistory[n-1]++;
            
            document.querySelectorAll('.sel-btn').forEach((b, i) => b.classList.toggle('active', i + 1 === n));
            document.getElementById('themeName').innerText = names[n-1];
            
            if (isPlaying) {
                clearTimeout(nextLoopTimeout);
                players.player("t" + n).start(Tone.now(), 0);
                players.player("t" + oldT).stop("+6"); // Stop après le fade
                scheduleNextLoop();
            }
        }

        const names = ["Orchestre Noble", "Onde Hertz", "Bois de Roseau", "Écho de Grotte", "Chœur de Velours", "Aube de Jade", "Souffle Sacré", "Résonance de Gorge"];

        function toggleAuto() {
            isAuto = !isAuto;
            document.getElementById('autoToggle').classList.toggle('on', isAuto);
            if (isAuto) {
                themeStartTime = Date.now();
                autoCheckInterval = setInterval(checkAutoChange, 1000);
            } else {
                clearInterval(autoCheckInterval);
                document.getElementById('timerStatus').innerText = "Stable";
            }
        }

        function checkAutoChange() {
            if (!isPlaying || !isAuto) return;
            const secs = Math.floor((Date.now() - themeStartTime) / 1000);
            const paliers = [30, 45, 60, 75, 90, 100];
            if (paliers.includes(secs) && lastChanceSec !== secs) {
                lastChanceSec = secs;
                if (Math.random() * 100 < (secs === 100 ? 100 : secs)) pickSmartNextTheme();
            }
            document.getElementById('timerStatus').innerText = `Tps: ${secs}s`;
        }

        function pickSmartNextTheme() {
            let weights = themeHistory.map(h => 1 / (h + 1));
            weights[currentTheme - 1] = 0;
            let sum = weights.reduce((a, b) => a + b, 0);
            let rand = Math.random() * sum, acc = 0, nextT = 1;
            for (let i = 0; i < weights.length; i++) {
                acc += weights[i];
                if (rand <= acc) { nextT = i + 1; break; }
            }
            manualChange(nextT);
        }
    </script>
</body>
</html>
