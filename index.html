<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Musique Infinie V4 - Clean</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        /* FOND VERT TRÈS SOMBRE POUR LA DISTINCTION V4 */
        body { background: #051a05; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        #mainBtn { padding: 15px 40px; font-size: 18px; border-radius: 50px; border: none; background: #2ecc71; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <h1 style="font-weight: 300; margin-bottom: 50px;">Musique Infinie V4</h1>
    <button id="mainBtn">Lancer la musique</button>

    <script>
        const btn = document.getElementById('mainBtn');
        let isPlaying = false;

        // RÉGLAGES DE SECOURS EXTRÊME
        Tone.context.lookAhead = 0.8; // Presque 1 seconde d'avance
        Tone.context.latencyHint = "playback";

        // Un synthé ultra-basique, sans effets complexes
        const piano = new Tone.Synth({
            oscillator: { type: "sine" },
            envelope: { attack: 3, decay: 2, sustain: 0.8, release: 5 }
        }).toDestination();

        // On remplace le Delay par un simple gain pour éviter tout calcul
        piano.volume.value = -15;

        const notes = ["F2", "Ab2", "C3", "Eb3", "F3", "Ab3"];

        const loop = new Tone.Loop((time) => {
            if (Math.random() > 0.3) {
                const n = notes[Math.floor(Math.random() * notes.length)];
                // On utilise "time" pour que Tone.js gère la précision
                piano.triggerAttackRelease(n, "1n", time);
            }
        }, "2n");

        btn.addEventListener('click', async () => {
            if (!isPlaying) {
                await Tone.start();
                // On s'assure que le contexte est bien lancé
                if (Tone.context.state !== 'running') {
                    await Tone.context.resume();
                }
                Tone.Transport.start();
                loop.start(0);
                btn.innerText = "Arrêter";
                isPlaying = true;
            } else {
                Tone.Transport.stop();
                loop.stop();
                piano.triggerRelease();
                btn.innerText = "Lancer la musique";
                isPlaying = false;
            }
        });
    </script>
</body>
</html>
