<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V3.4 - NON-STOP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { background: #050505; color: #444; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        #mainBtn { width: 200px; height: 200px; border: 1px solid #222; border-radius: 50%; background: transparent; color: #666; cursor: pointer; font-size: 12px; letter-spacing: 5px; text-transform: uppercase; transition: 0.5s; }
        #mainBtn.active { border-color: #ee9b00; color: #ee9b00; box-shadow: 0 0 40px rgba(238, 155, 0, 0.1); }
        p { margin-top: 20px; font-size: 10px; opacity: 0.5; text-align: center; line-height: 1.6; }
    </style>
</head>
<body>

    <button id="mainBtn">Démarrer</button>
    <p>V3.4 - ORCHESTRE HUMANISÉ<br>(Optimisé pour l'écoute écran éteint)</p>

    <script>
        const btn = document.getElementById('mainBtn');
        let isPlaying = false;

        // --- CONFIGURATION ORCHESTRE V3.3 (Ton 10/10) ---
        const piano = new Tone.Sampler({
            urls: { "C4": "C4.mp3", "A3": "A3.mp3" },
            baseUrl: "https://tonejs.github.io/audio/salamander/",
        }).toDestination();
        piano.volume.value = -8;

        const harp = new Tone.PolySynth(Tone.Synth, {
            oscillator: { type: "sine" },
            envelope: { attack: 0.2, decay: 1, sustain: 0, release: 3 }
        }).toDestination();
        const hDelay = new Tone.PingPongDelay("4n", 0.2).toDestination();
        harp.connect(hDelay);
        harp.volume.value = -28;

        const strings = new Tone.PolySynth(Tone.Synth, {
            oscillator: { type: "triangle" },
            envelope: { attack: 5, release: 8 }
        }).toDestination();
        const sFilter = new Tone.Filter(180, "lowpass").toDestination();
        strings.connect(sFilter);
        strings.volume.value = -32;

        const progression = [
            ["F2", "A3", "C4", "E4", "G4"],
            ["D2", "F3", "A3", "C4", "F4"],
            ["Bb1", "D3", "F3", "A3", "D4"]
        ];
        let currentIdx = 0;
        let step = 0;

        const loop = new Tone.Loop((time) => {
            step++;
            if (step % 32 === 1) {
                currentIdx = (currentIdx + 1) % progression.length;
                strings.releaseAll();
                strings.triggerAttack([progression[currentIdx][1], progression[currentIdx][2]], time);
            }
            const activeChord = progression[currentIdx];
            const jitter = Math.random() * 0.05;

            if (Math.random() > 0.5) {
                const note = activeChord[Math.floor(Math.random() * 2) + 2];
                const velocity = Math.random() * 0.1 + 0.02;
                piano.triggerAttackRelease(note, "1n", time + jitter, velocity);
            }

            if (Math.random() > 0.7) {
                const hNote = activeChord[Math.floor(Math.random() * 2) + 3];
                const hVelocity = Math.random() * 0.05 + 0.01;
                harp.triggerAttackRelease(hNote, "2n", time + 0.2 + jitter, hVelocity);
            }
        }, "4n");

        // --- GESTION DU MODE ARRIÈRE-PLAN ---
        btn.addEventListener('click', async () => {
            if (!isPlaying) {
                await Tone.start();
                
                // On crée un oscillateur inaudible pour "tromper" le navigateur
                // et l'empêcher de couper le son en veille.
                const nosleep = new Tone.Oscillator().toDestination();
                nosleep.frequency.value = 0; // Fréquence 0 = Inaudible
                nosleep.start();

                Tone.Transport.start();
                loop.start(0);
                btn.innerText = "En cours";
                btn.classList.add('active');
                isPlaying = true;
            } else {
                Tone.Transport.stop();
                loop.stop();
                strings.releaseAll();
                btn.innerText = "Démarrer";
                btn.classList.remove('active');
                isPlaying = false;
            }
        });
    </script>
</body>
</html>
