<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V1.6 - COHÉRENCE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { background: #2c3e50; color: #d4af37; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: serif; }
        #mainBtn { width: 140px; height: 140px; border-radius: 50%; border: 2px solid #d4af37; background: transparent; color: #d4af37; cursor: pointer; font-variant: small-caps; letter-spacing: 2px; }
        h1 { font-weight: 200; margin-bottom: 30px; opacity: 0.6; }
    </style>
</head>
<body>

    <h1>V1.6 • Harmonie</h1>
    <button id="mainBtn">Charger</button>

    <script>
        const btn = document.getElementById('mainBtn');
        let isPlaying = false;

        // 1. LE PIANO (Mélodie)
        const piano = new Tone.Sampler({
            urls: { "C4": "C4.mp3", "A3": "A3.mp3" },
            baseUrl: "https://tonejs.github.io/audio/salamander/",
            onload: () => { btn.innerText = "Écouter"; }
        }).toDestination();
        piano.volume.value = -5;

        // 2. LE RHODES (Ancrage/Basse douce)
        const rhodes = new Tone.PolySynth(Tone.Synth, {
            oscillator: { type: "sine" },
            envelope: { attack: 3, release: 5 }
        }).toDestination();
        const rFilter = new Tone.Filter(200, "lowpass").toDestination();
        rhodes.connect(rFilter);
        rhodes.volume.value = -25;

        // ACCORDS POUR LA COHÉRENCE
        const chords = [
            ["C3", "E3", "G3", "B3"], // Accord 1
            ["A2", "C3", "E3", "G3"], // Accord 2
            ["F2", "A2", "C3", "E3"]  // Accord 3
        ];
        let currentChordIdx = 0;
        let step = 0;

        const loop = new Tone.Loop((time) => {
            step++;

            // Changement d'accord toutes les 8 mesures (32 steps)
            if (step % 32 === 1) {
                currentChordIdx = (currentChordIdx + 1) % chords.length;
                const rootNote = chords[currentChordIdx][0];
                rhodes.releaseAll();
                rhodes.triggerAttack(rootNote, time); // La basse pose le décor
            }

            // Piano mélodie (puise dans l'accord actuel pour la cohérence)
            if (Math.random() > 0.4) {
                const currentNotes = chords[currentChordIdx];
                const note = currentNotes[Math.floor(Math.random() * currentNotes.length)];
                
                // On ajoute une octave pour la mélodie
                const melodyNote = note.replace(/[0-9]/g, '') + "4";
                piano.triggerAttackRelease(melodyNote, "1n", time, Math.random() * 0.2 + 0.1);
            }
        }, "4n");

        btn.addEventListener('click', async () => {
            if (!isPlaying) {
                await Tone.start();
                Tone.Transport.start();
                loop.start(0);
                btn.innerText = "Pause";
                isPlaying = true;
            } else {
                Tone.Transport.stop();
                loop.stop();
                rhodes.releaseAll();
                btn.innerText = "Écouter";
                isPlaying = false;
            }
        });
    </script>
</body>
</html>
