<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="UG 67">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/f0f9f5/a8b9ad?text=UG">
    <meta name="theme-color" content="#ffffff">

    <title>UG 67 - STUDIO V18.8</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    
    <style>
        :root { --v-fond: #ffffff; --v-accent: #2d4a3e; --v-soft: #a8b9ad; --v-green: #4caf50; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        
        body { 
            background: var(--v-fond); 
            color: var(--v-accent); 
            margin: 0; 
            padding: 0; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* IDENTIFIANT EN HAUT À GAUCHE */
        .header-tag { 
            padding: 15px 20px; 
            font-family: monospace; 
            font-size: 9px; 
            font-weight: bold; 
            opacity: 0.3; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            text-align: left;
            width: 100%;
        }

        .container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-evenly; 
            padding: 10px 20px 40px 20px; 
        }

        #mainBtn { 
            width: 150px; 
            height: 150px; 
            border: 1px solid #f0f0f0; 
            border-radius: 50%; 
            background: #fcfdfc; 
            color: var(--v-accent); 
            font-size: 11px; 
            letter-spacing: 5px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: 0.4s; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.02); 
        }

        #mainBtn.active { 
            background: var(--v-accent); 
            color: #fff; 
            border-color: var(--v-accent); 
            transform: scale(0.95); 
            box-shadow: 0 10px 30px rgba(45,74,62,0.1); 
        }

        .selector { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 12px; 
            width: 100%; 
            max-width: 340px; 
        }

        .sel-btn { 
            background: #fcfdfc; 
            border: 1px solid #f8fcf9; 
            color: var(--v-soft); 
            font-size: 16px; 
            height: 60px; 
            border-radius: 20px; 
            cursor: pointer; 
            transition: 0.3s; 
        }

        .sel-btn.active { 
            color: var(--v-accent); 
            border-color: #eee; 
            font-weight: bold; 
            background: #fff; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.03); 
        }

        .auto-section { 
            width: 100%; 
            max-width: 300px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 15px; 
        }

        .toggle-container { 
            width: 65px; 
            height: 34px; 
            background: #eee; 
            border-radius: 20px; 
            padding: 4px; 
            cursor: pointer; 
            position: relative; 
            transition: 0.3s; 
        }

        .toggle-container.on { background: var(--v-green); }

        .toggle-circle { 
            width: 26px; 
            height: 26px; 
            background: white; 
            border-radius: 50%; 
            transition: 0.3s; 
            position: absolute; 
            top: 4px; 
            left: 4px; 
        }

        .toggle-container.on .toggle-circle { left: 35px; }

        #themeName { font-size: 16px; font-weight: 500; color: var(--v-accent); letter-spacing: 0.5px; }
        
        #statusIndicator { 
            font-size: 10px; 
            color: var(--v-soft); 
            font-family: monospace; 
            letter-spacing: 1.5px; 
            text-transform: uppercase; 
        }
    </style>
</head>
<body>

    <div class="header-tag">UG 67 — CÉDRIC</div>

    <div class="container">
        <button id="mainBtn">START</button>
        <div class="selector">
            <button class="sel-btn active" onclick="manualChange(1)">I</button>
            <button class="sel-btn" onclick="manualChange(2)">II</button>
            <button class="sel-btn" onclick="manualChange(3)">III</button>
            <button class="sel-btn" onclick="manualChange(4)">IV</button>
            <button class="sel-btn" onclick="manualChange(5)">V</button>
            <button class="sel-btn" onclick="manualChange(6)">VI</button>
            <button class="sel-btn" onclick="manualChange(7)">VII</button>
            <button class="sel-btn" onclick="manualChange(8)">VIII</button>
        </div>
        <div class="auto-section">
            <div id="autoToggle" class="toggle-container" onclick="toggleAuto()"><div class="toggle-circle"></div></div>
            <div id="themeName">Orchestre Noble</div>
            <div id="statusIndicator">STABLE</div>
        </div>
    </div>

    <script>
        // SERVICE WORKER
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }

        let isPlaying = false, isAuto = false, currentTheme = 1;
        let themeStartTime = Date.now(), lastCheckedMin = -1, nextLoopTimeout = null, autoCheckInterval = null;
        let themeWeights = [1, 1, 1, 1, 1, 1, 1, 1];

        const limiter = new Tone.Limiter(-2).toDestination();
        const mainBus = new Tone.Gain(1).connect(limiter);

        const createDeck = () => {
            const g = new Tone.Gain(0).connect(mainBus);
            const p = new Tone.Players({
                "t1": "theme1.mp3", "t2": "theme2.mp3", "t3": "theme3.mp3", "t4": "theme4.mp3",
                "t5": "theme5.mp3", "t6": "theme6.mp3", "t7": "theme7.mp3", "t8": "theme8.mp3"
            }).connect(g);
            return { players: p, volume: g };
        };

        const deckA = createDeck();
        const deckB = createDeck();
        let activeDeck = deckA;

        const names = ["Orchestre Noble", "Onde Hertz", "Bois de Roseau", "Écho de Grotte", "Chœur de Velours", "Aube de Jade", "Souffle Sacré", "Résonance de Gorge"];

        function scheduleNextLoop() {
            if (!isPlaying) return;
            const p = activeDeck.players.player("t" + currentTheme);
            const duration = p.buffer.duration;
            const timeToWait = (duration - 4.1) * 1000;

            clearTimeout(nextLoopTimeout);
            nextLoopTimeout = setTimeout(() => {
                if (isPlaying) {
                    const nextDeck = (activeDeck === deckA) ? deckB : deckA;
                    nextDeck.volume.gain.rampTo(1, 4);
                    nextDeck.players.player("t" + currentTheme).start(Tone.now());
                    activeDeck.volume.gain.rampTo(0, 4);
                    activeDeck = nextDeck;
                    scheduleNextLoop();
                }
            }, timeToWait);
        }

        document.getElementById('mainBtn').onclick = async () => {
            await Tone.start();
            if (!isPlaying) {
                isPlaying = true; themeStartTime = Date.now();
                activeDeck.volume.gain.value = 1;
                activeDeck.players.player("t" + currentTheme).start(Tone.now());
                scheduleNextLoop();
                document.getElementById('mainBtn').innerText = "STOP";
                document.getElementById('mainBtn').classList.add("active");
            } else {
                isPlaying = false; 
                clearTimeout(nextLoopTimeout);
                deckA.volume.gain.rampTo(0, 0.1); deckB.volume.gain.rampTo(0, 0.1);
                document.getElementById('mainBtn').innerText = "START";
                document.getElementById('mainBtn').classList.remove("active");
            }
        };

        function manualChange(n) {
            if (n === currentTheme && isPlaying) return;
            currentTheme = n;
            themeStartTime = Date.now(); lastCheckedMin = -1;
            themeWeights[n-1] += 2; 

            document.querySelectorAll('.sel-btn').forEach((b, i) => b.classList.toggle('active', i + 1 === n));
            document.getElementById('themeName').innerText = names[n-1];
            
            if (isPlaying) {
                clearTimeout(nextLoopTimeout);
                const now = Tone.now();
                const nextDeck = (activeDeck === deckA) ? deckB : deckA;

                if (isAuto) {
                    activeDeck.volume.gain.rampTo(0, 2);
                    nextDeck.volume.gain.value = 0;
                    setTimeout(() => {
                        if(!isPlaying) return;
                        nextDeck.players.player("t" + n).start();
                        nextDeck.volume.gain.rampTo(1, 2);
                        activeDeck = nextDeck;
                        scheduleNextLoop();
                    }, 2500);
                } else {
                    activeDeck.volume.gain.rampTo(0, 0.1);
                    nextDeck.volume.gain.value = 1;
                    nextDeck.players.player("t" + n).start(now + 0.05);
                    activeDeck = nextDeck;
                    scheduleNextLoop();
                }
            }
        }

        function toggleAuto() {
            isAuto = !isAuto;
            document.getElementById('autoToggle').classList.toggle('on', isAuto);
            const indicator = document.getElementById('statusIndicator');
            
            if (isAuto) {
                themeStartTime = Date.now();
                indicator.innerText = "AUTOMATIQUE";
                autoCheckInterval = setInterval(() => {
                    if (!isPlaying || !isAuto) return;
                    
                    const minutesPassed = Math.floor((Date.now() - themeStartTime) / 60000);
                    const paliers = [30, 45, 60, 75, 90, 100]; 
                    
                    if (paliers.includes(minutesPassed) && lastCheckedMin !== minutesPassed) {
                        lastCheckedMin = minutesPassed;
                        if (Math.random() * 100 < minutesPassed) {
                            pickSmartNextTheme();
                        }
                    }
                }, 1000); 
            } else {
                clearInterval(autoCheckInterval);
                indicator.innerText = "STABLE";
            }
        }

        function pickSmartNextTheme() {
            let inverseWeights = themeWeights.map(w => 1 / w);
            inverseWeights[currentTheme - 1] = 0;
            let totalWeight = inverseWeights.reduce((a, b) => a + b, 0);
            let random = Math.random() * totalWeight;
            let cumulative = 0;
            let nextT = 1;
            for (let i = 0; i < inverseWeights.length; i++) {
                cumulative += inverseWeights[i];
                if (random < cumulative) { nextT = i + 1; break; }
            }
            manualChange(nextT);
        }
    </script>
</body>
</html>
