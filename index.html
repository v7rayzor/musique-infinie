<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UG 67 - Cédric (Mobile Fix)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --v-fond: #ffffff; --v-accent: #2d4a3e; --v-soft: #a8b9ad; --v-red: #cc5a5a; --v-green: #4caf50; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: var(--v-fond); color: var(--v-accent); margin: 0; padding: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header-tag { padding: 15px; font-family: monospace; font-size: 10px; font-weight: bold; opacity: 0.6; }
        .container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #mainBtn { width: 120px; height: 120px; border: 2px solid var(--v-accent); border-radius: 50%; background: transparent; color: var(--v-accent); font-size: 12px; letter-spacing: 4px; font-weight: 700; margin-bottom: 30px; outline:none; }
        #mainBtn.active { background: var(--v-accent); color: #fff; }
        .selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; max-width: 320px; margin-bottom: 30px; }
        .sel-btn { background: #f8fbf9; border: 1px solid #eee; color: var(--v-soft); font-size: 16px; height: 55px; border-radius: 14px; outline:none; }
        .sel-btn.active { color: var(--v-accent); border-color: var(--v-accent); font-weight: bold; background: #fff; }
        .auto-section { width: 100%; max-width: 300px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .toggle-container { width: 60px; height: 32px; background: #eee; border-radius: 20px; padding: 4px; cursor: pointer; transition: 0.3s; }
        .toggle-container.on { background: var(--v-green); }
        .toggle-container.off { background: var(--v-red); }
        .toggle-circle { width: 24px; height: 24px; background: white; border-radius: 50%; transition: 0.3s; }
        .toggle-container.on .toggle-circle { transform: translateX(28px); }
        #themeName { font-size: 14px; font-weight: 400; color: var(--v-accent); margin-top: 5px; }
        #timerStatus { font-size: 9px; color: var(--v-soft); font-family: monospace; }
    </style>
</head>
<body>
    <div class="header-tag">UG 67 - CÉDRIC</div>
    <div class="container">
        <button id="mainBtn">START</button>
        <div class="selector">
            <button class="sel-btn active" onclick="manualChange(1)">I</button>
            <button class="sel-btn" onclick="manualChange(2)">II</button>
            <button class="sel-btn" onclick="manualChange(3)">III</button>
            <button class="sel-btn" onclick="manualChange(4)">IV</button>
            <button class="sel-btn" onclick="manualChange(5)">V</button>
            <button class="sel-btn" onclick="manualChange(6)">VI</button>
            <button class="sel-btn" onclick="manualChange(7)">VII</button>
            <button class="sel-btn" onclick="manualChange(8)">VIII</button>
        </div>
        <div class="auto-section">
            <div id="autoToggle" class="toggle-container off" onclick="toggleAuto()"><div class="toggle-circle"></div></div>
            <div id="themeName">Orchestre Noble</div>
            <div id="timerStatus">STATUT: STABLE</div>
        </div>
    </div>

    <script>
        let isPlaying = false, isAuto = false, currentTheme = 1;
        let audioTimer = null, themeStartTime = Date.now(), autoCheckInterval = null;
        let themeHistory = [0,0,0,0,0,0,0,0];

        // CHAÎNE AUDIO SIMPLIFIÉE (Plus de compresseur, juste un Limiter léger)
        const master = new Tone.Gain(1.2).toDestination();
        const names = ["Orchestre Noble", "Onde Hertz", "Bois de Roseau", "Écho de Grotte", "Chœur de Velours", "Aube de Jade", "Souffle Sacré", "Résonance de Gorge"];
        const chords = [["F2", "A3", "C4"], ["D2", "F3", "A3"], ["Bb1", "D3", "F3"], ["G2", "Bb3", "D4"], ["C2", "E3", "G3"]];

        // INSTRUMENTS SANS EFFETS LOURDS
        const synths = [
            new Tone.PolySynth(Tone.Synth, {oscillator:{type:"triangle"}, envelope:{attack:3, release:5}}).connect(master),
            new Tone.PolySynth(Tone.Synth, {oscillator:{type:"sine"}, envelope:{attack:5, release:5}}).connect(master),
            new Tone.PolySynth(Tone.Synth, {oscillator:{type:"sine"}, envelope:{attack:4, release:4}}).connect(new Tone.Filter(150, "lowpass").connect(master)),
            new Tone.PolySynth(Tone.Synth, {oscillator:{type:"sine"}, envelope:{attack:0.1, decay:2, sustain:0, release:2}}).connect(master),
            new Tone.PolySynth(Tone.Synth, {oscillator:{type:"sine"}, envelope:{attack:5, release:7}}).connect(new Tone.Filter(200, "bandpass").connect(master)),
            new Tone.PolySynth(Tone.Synth, {oscillator:{type:"sine"}, envelope:{attack:4, release:8}}).connect(master),
            new Tone.PolySynth(Tone.Synth, {oscillator:{type:"sine"}, envelope:{attack:6, release:8}}).connect(new Tone.Filter(400, "bandpass").connect(master)),
            new Tone.PolySynth(Tone.Synth, {oscillator:{type:"triangle"}, envelope:{attack:8, release:10}}).connect(new Tone.Filter(100, "lowpass").connect(master))
        ];

        // Volumes ajustés pour mobile
        synths.forEach((s, i) => s.volume.value = i === 3 ? -3 : -12);

        function play() {
            if (!isPlaying) return;
            const chord = chords[Math.floor(Math.random() * chords.length)];
            synths.forEach(s => s.releaseAll());
            const s = synths[currentTheme - 1];
            const jitter = Math.random() * 0.5;
            s.triggerAttack([chord[1], chord[2]], "+" + (0.5 + jitter));
            audioTimer = setTimeout(play, 7000 + Math.random() * 7000);
        }

        function checkAutoChange() {
            if (!isPlaying || !isAuto) return;
            const minutes = (Date.now() - themeStartTime) / 60000;
            let chance = 0;
            if (minutes >= 100) chance = 100; else if (minutes >= 90) chance = 90;
            else if (minutes >= 75) chance = 75; else if (minutes >= 60) chance = 60;
            else if (minutes >= 45) chance = 45; else if (minutes >= 30) chance = 30;
            document.getElementById('timerStatus').innerText = `AUTO: ${Math.floor(minutes)}M / CHANCE: ${chance}%`;
            if (Math.random() * 100 < chance) {
                let weights = themeHistory.map(h => 1 / (h + 1));
                weights[currentTheme - 1] = 0;
                let sum = weights.reduce((a, b) => a + b, 0), rand = Math.random() * sum, acc = 0, nextT = 1;
                for (let i = 0; i < weights.length; i++) { acc += weights[i]; if (rand <= acc) { nextT = i + 1; break; } }
                manualChange(nextT);
            }
        }

        function toggleAuto() {
            isAuto = !isAuto;
            document.getElementById('autoToggle').className = isAuto ? 'toggle-container on' : 'toggle-container off';
            if (isAuto) { themeStartTime = Date.now(); autoCheckInterval = setInterval(checkAutoChange, 30000); }
            else { clearInterval(autoCheckInterval); document.getElementById('timerStatus').innerText = "STATUT: STABLE"; }
        }

        function manualChange(n) {
            currentTheme = n; themeStartTime = Date.now(); themeHistory[n-1]++;
            document.querySelectorAll('.sel-btn').forEach((b, i) => b.classList.toggle('active', i + 1 === n));
            document.getElementById('themeName').innerText = names[n - 1];
            if (isPlaying) { if (audioTimer) clearTimeout(audioTimer); play(); }
        }

        document.getElementById('mainBtn').onclick = async () => {
            if (!isPlaying) {
                await Tone.start(); isPlaying = true; play();
                document.getElementById('mainBtn').innerText = "STOP";
                document.getElementById('mainBtn').classList.add("active");
            } else {
                isPlaying = false; if (audioTimer) clearTimeout(audioTimer);
                synths.forEach(s => s.releaseAll());
                document.getElementById('mainBtn').innerText = "START";
                document.getElementById('mainBtn').classList.remove("active");
            }
        };
    </script>
</body>
</html>
