<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V9 - HARMONIE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { background: #fff; color: #2c3e50; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Helvetica Neue', sans-serif; }
        #mainBtn { padding: 15px 40px; border: 1px solid #2c3e50; background: transparent; color: #2c3e50; cursor: pointer; text-transform: uppercase; font-weight: 300; letter-spacing: 3px; }
        h1 { font-weight: 200; margin-bottom: 30px; color: #bdc3c7; }
    </style>
</head>
<body>

    <h1>V9 • RESONANCE</h1>
    <button id="mainBtn">CHARGEMENT</button>

    <script>
        const btn = document.getElementById('mainBtn');
        let isPlaying = false;

        const sampler = new Tone.Sampler({
            urls: { "C4": "C4.mp3", "A3": "A3.mp3", "F3": "F3.mp3" },
            baseUrl: "https://tonejs.github.io/audio/salamander/",
            onload: () => { btn.innerText = "LANCER"; }
        }).toDestination();

        const filter = new Tone.Filter(380, "lowpass").toDestination();
        sampler.connect(filter);

        // --- LES DEUX CERVEAUX ---
        const moods = [
            ["F2", "A2", "C3", "E3", "G3"], // Rêveur (Fa Majeur 7)
            ["D2", "F2", "A2", "C3", "F3"], // Mélancolique (Ré mineur 7)
            ["G2", "B2", "D3", "F3", "G3"]  // Suspendu
        ];
        
        let currentMood = 0;
        let step = 0;

        const loop = new Tone.Loop((time) => {
            step++;

            // Toutes les 16 notes, on change d'accord (le "cerveau" évolue)
            if (step % 16 === 0) {
                currentMood = Math.floor(Math.random() * moods.length);
            }

            if (Math.random() > 0.4) {
                const currentScale = moods[currentMood];
                const note = currentScale[Math.floor(Math.random() * currentScale.length)];
                
                // Humanisation : micro-décalage (swing)
                const humanTime = time + (Math.random() * 0.1); 
                
                // Humanisation : force de frappe très légère
                const velocity = Math.random() * 0.25 + 0.05;

                sampler.triggerAttackRelease(note, "1n", humanTime, velocity);
            }
            
            // Une note de basse profonde de temps en temps
            if (step % 8 === 0) {
                sampler.triggerAttackRelease(moods[currentMood][0], "2n", time, 0.1);
            }

        }, "4n");

        btn.addEventListener('click', async () => {
            if (!isPlaying) {
                await Tone.start();
                Tone.Transport.start();
                loop.start(0);
                btn.innerText = "ARRET";
                isPlaying = true;
            } else {
                Tone.Transport.stop();
                loop.stop();
                btn.innerText = "LANCER";
                isPlaying = false;
            }
        });
    </script>
</body>
</html>
